<header>
	<div class="logo">
		<a href="{{ '/' | relative_url }}" target="_self" class="headerName">
		  Jumong Portfolio
		</a>
	</div>
	<nav class="scroll">
		<ul>
			{% for page in site.pages %}
			  {% if page.include_in_header == true %}
			  <li><a href="{{ page.url | relative_url }}" target="_self">{{ page.title }}</a></li>
			  {% endif %}
			{% endfor %}
		</ul>
	</nav>
</header>
